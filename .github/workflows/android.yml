name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper/
        key: gradle-${{ hashFiles('**/gradle-wrapper.properties') }}-${{ hashFiles('**/*.gradle*', '**/build.gradle*') }}
        restore-keys: |
          gradle-

    - name: Restore debug keystore
      env:
        ANDROID_DEBUG_KEYSTORE: ${{ secrets.ANDROID_DEBUG_KEYSTORE }}
      run: |
        if [ -n "$ANDROID_DEBUG_KEYSTORE" ]; then
          mkdir -p ~/.android
          echo "$ANDROID_DEBUG_KEYSTORE" | base64 --decode > ~/.android/debug.keystore
          echo "Debug keystore restored."
        else
          echo "No secret found. Gradle will generate a temporary debug keystore."
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build APKs
      run: ./gradlew assembleDebug assembleRelease

    - name: Get commit count
      id: commit_count
      run: |
        COUNT=$(git rev-list --count HEAD)
        echo "COUNT=$COUNT" >> $GITHUB_ENV
        echo "count=$COUNT" >> $GITHUB_OUTPUT
        echo "Version: v$COUNT"

    - name: Compute version info
      id: version_info
      run: |
        VERSION_CODE=$(git rev-list --count HEAD)
        VERSION_NAME="1.${VERSION_CODE}"
        COMMUNITY_TAG="${VERSION_CODE}-${VERSION_NAME}"
        echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
        echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
        echo "COMMUNITY_TAG=$COMMUNITY_TAG" >> $GITHUB_ENV
        echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "community_tag=$COMMUNITY_TAG" >> $GITHUB_OUTPUT

    - name: Rename APKs
      run: |
        find app/build/outputs/apk -type f -name "*.apk" | while read file; do
          dir=$(dirname "$file")
          filename=$(basename "$file")

          if [[ "$filename" == *"debug"* ]]; then
            new_name="FuseHide_Debug_v${COUNT}.apk"
          else
            new_name="FuseHide_v${COUNT}.apk"
          fi

          mv "$file" "$dir/$new_name"
          echo "$filename -> $new_name"
        done

    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/FuseHide_Debug_v*.apk

    - name: Upload release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/FuseHide_v*.apk

    - name: Create GitHub Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.commit_count.outputs.count }}
        overwrite: true
        files: |
          app/build/outputs/apk/debug/FuseHide_Debug_v*.apk
          app/build/outputs/apk/release/FuseHide_v*.apk

    - name: Sync community release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      env:
        GH_TOKEN: ${{ secrets.XPOSED_REPO_TOKEN }}
      run: |
        set -e
        test -n "$GH_TOKEN"
        
        TARGET_REPO="Xposed-Modules-Repo/io.github.xiaotong6666.fusehide"
        MAIN_REPO="XiaoTong6666/FuseHide"
        
        RELEASE_APK=$(ls app/build/outputs/apk/release/FuseHide_v*.apk | head -n1)
        
        COMMIT_SHA=$(git rev-parse --short HEAD)
        COMMIT_FULL_SHA=$(git rev-parse HEAD)
        COMMIT_URL="https://github.com/${MAIN_REPO}/commit/${COMMIT_FULL_SHA}"
        COMMIT_MESSAGE=$(git log -1 --pretty=%B)
        
        cat > community-release-note.md <<EOF
        同步自主仓库构建产物喵
        
        commit: [${COMMIT_SHA}](${COMMIT_URL})
        
        message:
        ${COMMIT_MESSAGE}
        EOF
        
        if gh release view "$COMMUNITY_TAG" --repo "$TARGET_REPO" >/dev/null 2>&1; then
          gh release edit "$COMMUNITY_TAG" \
            --repo "$TARGET_REPO" \
            --title "$VERSION_NAME" \
            --notes-file community-release-note.md
        else
          gh release create "$COMMUNITY_TAG" \
            --repo "$TARGET_REPO" \
            --title "$VERSION_NAME" \
            --notes-file community-release-note.md
        fi
        
        gh release upload "$COMMUNITY_TAG" "$RELEASE_APK" \
          --repo "$TARGET_REPO" \
          --clobber