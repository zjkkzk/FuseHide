name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APKs
    uses: ./.github/workflows/build.yml
    with:
      java_version: '21'
    secrets: inherit

  release:
    name: Publish GitHub release
    needs: build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    uses: ./.github/workflows/release.yml
    with:
      release_tag: v${{ needs.build.outputs.version_code }}
      release_title: FuseHide ${{ needs.build.outputs.version_name }}
      delete_existing_assets: true
      version_name: ${{ needs.build.outputs.version_name }}
      version_code: ${{ needs.build.outputs.version_code }}
      commit_sha: ${{ needs.build.outputs.commit_sha }}
      commit_url: ${{ needs.build.outputs.commit_url }}
      build_duration: ${{ needs.build.outputs.build_duration }}
      release_apk_name: ${{ needs.build.outputs.release_apk_name }}
      debug_apk_name: ${{ needs.build.outputs.debug_apk_name }}
      release_sha256: ${{ needs.build.outputs.release_sha256 }}
      debug_sha256: ${{ needs.build.outputs.debug_sha256 }}
    secrets: inherit

  xposed-release:
    name: Sync Xposed community release
    needs:
      - build
      - release
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    uses: ./.github/workflows/xposed-release.yml
    with:
      main_repo: XiaoTong6666/FuseHide
      target_repo: Xposed-Modules-Repo/io.github.xiaotong6666.fusehide
      version_name: ${{ needs.build.outputs.version_name }}
      version_code: ${{ needs.build.outputs.version_code }}
      community_tag: ${{ needs.build.outputs.community_tag }}
      commit_sha: ${{ needs.build.outputs.commit_sha }}
      commit_full_sha: ${{ needs.build.outputs.commit_full_sha }}
      build_duration: ${{ needs.build.outputs.build_duration }}
      release_apk_name: ${{ needs.build.outputs.release_apk_name }}
      release_sha256: ${{ needs.build.outputs.release_sha256 }}
    secrets: inherit
